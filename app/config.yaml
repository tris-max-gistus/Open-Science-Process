# LLM Usage Logger Configuration
# Instructor-editable form fields. Edit labels and placeholders as needed.
# Do NOT change field names or types unless you know what you're doing.
# Note: Save this file as UTF-8 if editing to avoid encoding issues

# Shown in the browser tab and page header, and stamped into every saved
# log file. Set this to the course/project name so it's easy to tell
# instances apart if a student runs this tool for more than one class.
title: "Systems Thinking and Open Science"

checkin:
  - field: goal
    label: "What's today's goal?"
    type: textarea
    placeholder: "What are you trying to accomplish this session?"

  - field: planned_duration
    label: "How long are you planning to work on it?"
    type: text
    placeholder: "e.g. 1.5 hrs, 2 hours, 30 minutes"

  - field: checkin_notes
    label: "Other helpful notes?"
    type: textarea
    placeholder: "Anything else worth noting before you start -- context, blockers, reminders."

inputlog:
  - field: intent
    label: "What is the intended process and outcome?"
    type: textarea
    placeholder: "What are you trying to do, and what do you expect to come out of it?"

  - field: own_understanding
    label: "If you are going to use a large language model, explain the expected approach/output in your own words."
    type: textarea
    placeholder: "What do you already know about this question? What do you need from the LLM?"

  - field: inputs
    label: "Log an input (what YOU typed to the LLM, not the LLM's output)."
    type: input_list
    placeholder: "Paste only YOUR input/question sent to the LLM. Do NOT paste the LLM's output. Add one entry per input."

  - field: input_notes
    label: "Notes on process"
    type: input_notes
    placeholder: "-- anything future you might find helpful --"

  - field: reflection_outcome
    label: "What happened?"
    type: textarea
    placeholder: "What did you end up with? What's your overall impression with today's process?"

  - field: reflection_errors
    label: "Frustrations?"
    type: textarea
    placeholder: "Did the LLM get anything wrong, miss something, or hit a limitation? If not, say so."

  - field: reflection_surprises
    label: "Successes?"
    type: textarea
    placeholder: "Anything that worked better than expected, or a genuinely useful surprise?"

artifact:
  - field: artifact_content
    label: "Paste the LLM's output here (not your input)"
    type: textarea
    placeholder: "Paste the LLM's output, code, and/or explanation you want to save. --Capture especially helpful LLM OUTPUTS here--."

  - field: artifact_category
    label: "Give this artifact a handle to search for later?"
    type: text
    placeholder: "Thermodynamics, Recipes, Ethical tension between rights & obligations, etc."

checkout:
  - field: duration_actual
    label: "It has been {hours}. Any thoughts on process time quality?"
    type: textarea
    placeholder: "More or less time than you expected? Did it feel fast or slow?"

  - field: final_thoughts
    label: "Final thoughts?"
    type: textarea
    placeholder: "What did you accomplish, what surprised you, what's still unresolved?"

  - field: next_start
    label: "What's next?"
    type: textarea
    placeholder: "What would be helpful to remember when you return to this process?"

  - field: confidence
    label: "How confident do you feel about this process?"
    type: scale_1_5

  - field: clarity
    label: "How clear are the goals and expectations?"
    type: scale_1_5

  - field: support
    label: "Do you have the resources to proceed?"
    type: scale_1_5
